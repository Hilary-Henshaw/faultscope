version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    ignore:
      # Pin TensorFlow updates to minor versions only (breaking changes)
      - dependency-name: "tensorflow"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: "/docker"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
