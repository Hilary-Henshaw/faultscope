global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: faultscope

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: inference_service
    static_configs:
      - targets: ["inference:8000"]
    metrics_path: /metrics

  - job_name: alert_service
    static_configs:
      - targets: ["alerting:8001"]
    metrics_path: /metrics

  - job_name: stream_processor
    static_configs:
      - targets: ["streaming:8002"]
    metrics_path: /metrics

  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: timescaledb
    static_configs:
      - targets: ["postgres-exporter:9187"]
