apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    access: proxy
    editable: false
    jsonData:
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: 2.50.1

  - name: TimescaleDB
    type: postgres
    uid: timescaledb
    url: timescaledb:5432
    database: faultscope
    user: faultscope
    access: proxy
    editable: false
    secureJsonData:
      password: ${FAULTSCOPE_DB_PASSWORD}
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: true
